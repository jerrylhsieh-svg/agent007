name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    uses: jerrylhsieh-svg/git_workflow/.github/workflows/python-pytest.yml@main
    with:
      python-version: "3.12"
      working-directory: "."
  typecheck:
    uses: jerrylhsieh-svg/git_workflow/.github/workflows/python-typecheck.yml@main
    with:
      python-version: "3.12"
      app-directory: "agnet"