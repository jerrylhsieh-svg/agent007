services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file:
      - agent/.env
    volumes:
      - ${GCP_SERVICE_ACCOUNT_PATH}:/run/secrets/gcp-service-account.json:ro
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      MODEL: qwen2.5:1.5b
    ports:
      - "8000:8000"
  
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: agent007
    ports:
      - "5432:5432"
    volumes:
      - agent007_postgres_data:/var/lib/postgresql/data

volumes:
  ollama_data:
  agent007_postgres_data: