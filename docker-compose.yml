services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file:
      - agent/.env
    volumes:
      - /Users/jerryhsieh/Desktop/spendtracker-492918-dcb0633bc648.json:/run/secrets/gcp-service-account.json:ro
      - ./agent/templates:/app/templates
      - ./agent/static:/static
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      MODEL: qwen2.5:1.5b
    ports:
      - "8000:8000"

volumes:
  ollama_data: