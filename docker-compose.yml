services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file:
      - agent/.env
    volumes:
      - ${GCP_SERVICE_ACCOUNT_PATH}:/run/secrets/gcp-service-account.json:ro
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      MODEL: qwen2.5:1.5b
    ports:
      - "8000:8000"

volumes:
  ollama_data: